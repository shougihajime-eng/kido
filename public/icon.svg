<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15151a"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c060"/>
      <stop offset="55%" stop-color="#d4a24c"/>
      <stop offset="100%" stop-color="#b8893a"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- 将棋駒のシルエット（五角形）+「棋」風の抽象モチーフ -->
  <g transform="translate(256 256)" filter="url(#glow)">
    <!-- 五角形（駒）-->
    <polygon
      points="0,-140 110,-80 100,140 -100,140 -110,-80"
      fill="none"
      stroke="url(#gold)"
      stroke-width="14"
      stroke-linejoin="round"
    />
    <!-- 内側の縦ライン（道のメタファー）-->
    <line x1="0" y1="-100" x2="0" y2="100"
      stroke="url(#gold)" stroke-width="12" stroke-linecap="round"/>
    <!-- 横ライン -->
    <line x1="-60" y1="-30" x2="60" y2="-30"
      stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
    <line x1="-50" y1="40" x2="50" y2="40"
      stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
